version: 1
frontend:
  phases:
    install:
      commands:
        - 'echo "Current directory before cd: $(pwd)"'
        - cd react-portfolio
        - 'echo "Current directory after cd: $(pwd)"'
        - ls -la
        - 'echo "Checking for package.json:"'
        - ls -la package.json
        - npm ci
    build:
      commands:
        - 'echo "Build phase - Current directory: $(pwd)"'
        - cd react-portfolio
        - 'echo "Build phase - Directory after cd: $(pwd)"'
        - ls -la
        - npm run build
  artifacts:
    baseDirectory: react-portfolio/dist
    files:
      - '**/*'
  cache:
    paths:
      - react-portfolio/node_modules/**/*